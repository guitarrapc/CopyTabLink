name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3 or 1.2.3)"
        required: true
        type: string

jobs:
  verify:
    name: Verify tag and version
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve tag ref
        id: ref
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${TAG}"
            TAG="v${RAW#v}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag }}

      - name: Verify tag on remote (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api "repos/${{ github.repository }}/git/ref/tags/${{ steps.ref.outputs.tag }}" --silent --fail \
            || { echo "::error::Tag '${{ steps.ref.outputs.tag }}' does not exist on the remote. Push it first, then re-run."; exit 1; }

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ steps.ref.outputs.tag }}

      - name: Verify version ↔ tag consistency
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.ref.outputs.tag }}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${TAG#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: package.json has '$PACKAGE_VERSION' but tag is '$TAG' (expected '$TAG_VERSION')"
            exit 1
          fi
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "### Version check passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** \`${PACKAGE_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"

  package:
    needs: [verify]
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.verify.outputs.tag }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build extension
        run: npm run build
      - name: Create zip artifact
        run: zip -r ../copytablink-extension.zip .
        working-directory: dist
      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: copytablink-extension
          path: copytablink-extension.zip
          if-no-files-found: error

  attest:
    name: Attest package
    needs: [package]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: copytablink-extension
          path: ./publish
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "./publish/*.zip"
      - name: Prepare SLSA attestation bundles for release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for zip in ./publish/*.zip; do
            gh attestation download "$zip" --repo "${GITHUB_REPOSITORY}"
            bundle=(sha256:*.jsonl)
            if [ "${#bundle[@]}" -ne 1 ]; then
              echo "::error::Expected one attestation bundle for $zip, found ${#bundle[@]}"
              exit 1
            fi
            mv "${bundle[0]}" "./publish/$(basename "$zip").sigstore.jsonl"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: ./publish/
          retention-days: 1
          if-no-files-found: error

  create-release:
    if: ${{ github.event_name == 'push' }}
    needs: [verify, attest]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-assets
          path: ./release
      - name: List release assets
        shell: bash
        run: ls -al ./release
      - name: Validate release assets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(find release/ -maxdepth 1 -type f -print -quit)" ]; then
            echo "::error::No release assets found"
            exit 1
          fi
          echo "### Release assets" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          find release/ -maxdepth 1 -type f | sort | xargs -n 1 basename >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Create GitHub Release
        shell: bash
        run: |
          gh release create "$TAG" release/* --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes --verify-tag --draft
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.tag }}
