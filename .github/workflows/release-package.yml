name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build extension
        run: npm run build
      - name: Create zip artifact
        run: zip -r ../copytablink-extension.zip .
        working-directory: dist
      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: copytablink-extension
          path: copytablink-extension.zip
          if-no-files-found: error

  attest:
    name: Attest package
    needs: [package]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: copytablink-extension
          path: ./publish
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "./publish/*.zip"
      - name: Prepare SLSA attestation bundles for release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for zip in ./publish/*.zip; do
            gh attestation download "$zip" --repo "${GITHUB_REPOSITORY}"
            bundle=(sha256:*.jsonl)
            if [ "${#bundle[@]}" -ne 1 ]; then
              echo "::error::Expected one attestation bundle for $zip, found ${#bundle[@]}"
              exit 1
            fi
            mv "${bundle[0]}" "./publish/$(basename "$zip").sigstore.jsonl"
          done
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-assets
          path: ./publish/
          retention-days: 1
          if-no-files-found: error

  create-release:
    if: ${{ github.event_name == 'push' }}
    needs: [package, attest]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-assets
          path: ./release
      - name: List release assets
        shell: bash
        run: ls -al ./release
      - name: Validate release assets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(find release/ -maxdepth 1 -type f -print -quit)" ]; then
            echo "::error::No release assets found"
            exit 1
          fi
          echo "### Release assets" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          find release/ -maxdepth 1 -type f | sort | xargs -n 1 basename >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Create GitHub Release
        shell: bash
        run: |
          gh release create "$TAG" release/* --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes --verify-tag --draft
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
